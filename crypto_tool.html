<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES Encryption/Decryption Tool</title>
    <!-- Include CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --primary-color: #bd93f9;
            --secondary-color: #ff79c6;
            --success-color: #50fa7b;
            --error-color: #ff5555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #44475a;
            border-radius: 5px;
            background-color: #44475a;
            color: var(--text-color);
            font-family: 'Consolas', monospace;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .panels {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: var(--primary-color);
            color: var(--bg-color);
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #d6b4ff;
        }

        .btn-decrypt {
            background-color: var(--success-color);
        }

        .btn-decrypt:hover {
            background-color: #85ff9f;
        }

        .result-box {
            margin-top: 10px;
            padding: 15px;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 5px;
            min-height: 60px;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
        }

        .error {
            color: var(--error-color);
        }
        
        .hint {
            font-size: 0.85em;
            color: #8be9fd;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AES Crypto Tool</h1>
    
    <div class="form-group">
        <label for="secretKey">Secret Key & IV (UTF-8)</label>
        <input type="text" id="secretKey" value="7x!A%D*G-KaPdSgV" placeholder="Enter key...">
        <div class="hint">The target application uses the exact same string for both Key and IV in CBC mode.</div>
    </div>

    <div class="panels">
        <!-- Encrypt Panel -->
        <div class="panel">
            <div class="form-group">
                <label for="plainText">Plaintext (JSON / Text)</label>
                <textarea id="plainText" placeholder='e.g. {"roleId":1, "deptId":"2"}'></textarea>
            </div>
            <button onclick="performEncryption()">Encrypt Data</button>
            <div class="form-group">
                <label>Ciphertext Result</label>
                <div id="encryptResult" class="result-box"></div>
            </div>
        </div>

        <!-- Decrypt Panel -->
        <div class="panel">
            <div class="form-group">
                <label for="cipherText">Ciphertext (Base64)</label>
                <textarea id="cipherText" placeholder="e.g. ayR96vd5+QjWop+CwfIK5A=="></textarea>
            </div>
            <button class="btn-decrypt" onclick="performDecryption()">Decrypt Data</button>
            <div class="form-group">
                <label>Plaintext Result</label>
                <div id="decryptResult" class="result-box"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function getCryptoParams() {
        const keyString = document.getElementById('secretKey').value;
        const key = CryptoJS.enc.Utf8.parse(keyString);
        // The IV is the same as the key based on our findings
        const iv = CryptoJS.enc.Utf8.parse(keyString);
        return { key, iv };
    }

    function performEncryption() {
        const resultBox = document.getElementById('encryptResult');
        const plainText = document.getElementById('plainText').value.trim();
        
        if (!plainText) {
            resultBox.innerHTML = '<span class="error">Please enter plaintext.</span>';
            return;
        }

        try {
            const { key, iv } = getCryptoParams();
            const encrypted = CryptoJS.AES.encrypt(plainText, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            resultBox.innerText = encrypted.toString();
        } catch (error) {
            resultBox.innerHTML = `<span class="error">Encryption failed: ${error.message}</span>`;
        }
    }

    function performDecryption() {
        const resultBox = document.getElementById('decryptResult');
        const cipherText = document.getElementById('cipherText').value.trim();
        
        if (!cipherText) {
            resultBox.innerHTML = '<span class="error">Please enter ciphertext.</span>';
            return;
        }

        try {
            const { key, iv } = getCryptoParams();
            const decrypted = CryptoJS.AES.decrypt(cipherText, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            
            const plainText = decrypted.toString(CryptoJS.enc.Utf8);
            
            if (plainText) {
                // Try to pretty-print if it's JSON
                try {
                    const jsonObj = JSON.parse(plainText);
                    resultBox.innerText = JSON.stringify(jsonObj, null, 2);
                } catch (e) {
                    resultBox.innerText = plainText; // Not JSON, print as is
                }
            } else {
                resultBox.innerHTML = '<span class="error">Decryption failed. Invalid Key, IV, or Ciphertext format.</span>';
            }
        } catch (error) {
            resultBox.innerHTML = `<span class="error">Decryption error: ${error.message}</span>`;
        }
    }
</script>

</body>
</html>
