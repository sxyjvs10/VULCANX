<html>
<head><title>Test</title></head>
<body>
<script>
    var items = [];
    try {
        if (window.localStorage) {
            for (var i = 0; i < localStorage.length; i++) {
                items.push(localStorage.key(i));
            }
        }
    } catch(e) {
        items.push("error: " + e.message);
    }
    console.log("ITEMS", items);
</script>
</body>
</html>
